dataloader:
  batch_size: 512
  sample_size: 256
  test_dataset:
    coefficient: 0.01
    params:
      data_root: ../data/synthetic_u
      name: synth
      split: test
    sampling_steps: 200
    step_size: 0.05
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
  train_dataset:
    params:
      data_root: ../data/synthetic_u
      name: synth_u
      split: train
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
  valid_dataset:
    params:
      data_root: ../data/synthetic_u
      name: synth_u
      split: valid
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
model:
  params:
    attn_pd: 0.0
    beta_schedule: cosine
    d_model: 64
    feature_size: 1
    kernel_size: 1
    loss_type: l1
    mlp_hidden_times: 4
    n_heads: 4
    n_layer_dec: 2
    n_layer_enc: 3
    padding_size: 0
    resid_pd: 0.0
    sampling_timesteps: 500
    seq_length: 128
    timesteps: 500
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
solver:
  base_lr: 1.0e-05
  max_epochs: 18000
  results_folder: ./results/synth_u
